<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 580" role="img" aria-label="Giraffe Cleaning logo — capital G with giraffe ears and eyes">
  <title>Giraffe Cleaning</title>
  <!-- White-on-transparent. Pair with bg-foreground on a dark surface for
       authentic look, or invert via CSS filter on light surfaces. -->

  <!-- Two horns at the top, slightly splayed outward -->
  <path d="M 142 8
           C 132 8  124 18  124 32
           C 124 70 130 110 138 145
           L 168 145
           C 170 110 168 70  168 32
           C 168 18 156 8  142 8 Z"
        fill="white"/>
  <path d="M 258 8
           C 268 8  276 18  276 32
           C 276 70 270 110 262 145
           L 232 145
           C 230 110 232 70  232 32
           C 232 18 244 8  258 8 Z"
        fill="white"/>

  <!-- Two ear flares — pointed teardrops on each side of the G's crown,
       angled outward (left side mirrors right) -->
  <path d="M 40 195
           C 50 175 70 165 90 165
           L 110 200
           Z"
        fill="white"/>
  <path d="M 360 195
           C 350 175 330 165 310 165
           L 290 200
           Z"
        fill="white"/>

  <!-- The face — a black-negative-space area at the top of the G's bowl,
       containing the eyes. We render this implicitly by leaving an open
       cutout in the G path below. The two eyes overlay the cutout. -->

  <!-- The G letter — chunky, sans-serif. Outer shape minus inner cutout. -->
  <path fill="white" fill-rule="evenodd"
        d="M 200 145
           C 110 145  60 220  60 320
           C 60 432  120 530  220 530
           C 290 530  340 495  362 450
           L 362 320
           L 244 320
           L 244 376
           L 302 376
           L 302 410
           C 286 438  258 460  220 460
           C 158 460  130 410  130 320
           C 130 230  158 215  220 215
           C 252 215  280 232  300 256
           L 358 230
           C 332 175  282 145  200 145 Z

           M 178 192
           C 178 192 178 192 178 192
           Z"/>

  <!-- Mouth/face hollow at top of G — a small dark area where the eyes sit -->
  <path fill="black"
        d="M 178 168
           C 178 158  192 152  200 152
           C 208 152  222 158  222 168
           C 222 188  214 200  200 200
           C 186 200  178 188  178 168 Z"/>

  <!-- Eyes — two small white circles on the face -->
  <circle cx="190" cy="178" r="3.4" fill="white"/>
  <circle cx="210" cy="178" r="3.4" fill="white"/>
</svg>
