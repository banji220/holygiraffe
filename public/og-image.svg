<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Giraffe Cleaning — professional window cleaning in Orange County, CA. Call (949) 315-7142.">

  <defs>
    <!-- Subtle dot pattern matching the site background -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.6" fill="rgba(0,0,0,0.10)"/>
    </pattern>
    <!-- Reusable filter for the brutal hard-shadow effect -->
    <filter id="brutal" x="-10%" y="-10%" width="130%" height="130%">
      <feOffset in="SourceAlpha" dx="6" dy="6" result="off"/>
      <feFlood flood-color="#1a1a1a"/>
      <feComposite in2="off" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F4C116"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Outer brutal border -->
  <rect x="14" y="14" width="1172" height="602" fill="none" stroke="#1a1a1a" stroke-width="14"/>

  <!-- ═══════════════════════════════════════════════════════════════
       LEFT — Giraffe G logo, recreated as SVG paths so it rasterises
       cleanly at any size with no font/font-rendering dependency.
       ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(160, 105)">
    <!-- Two horn shapes (rounded teardrops, slightly tilted outward) -->
    <path
      d="M 32,0 C 64,0 76,40 70,90 C 66,120 50,135 32,135 C 14,135 -2,120 -6,90 C -12,40 0,0 32,0 Z"
      fill="#1a1a1a"
      transform="translate(78, 0) rotate(-8 32 67)"
    />
    <path
      d="M 32,0 C 64,0 76,40 70,90 C 66,120 50,135 32,135 C 14,135 -2,120 -6,90 C -12,40 0,0 32,0 Z"
      fill="#1a1a1a"
      transform="translate(220, 0) rotate(8 32 67)"
    />

    <!-- Eyes (white outer + black pupil), peeking between horns -->
    <g transform="translate(0, 60)">
      <circle cx="135" cy="0"  r="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
      <circle cx="140" cy="-2" r="8"  fill="#1a1a1a"/>
      <circle cx="225" cy="0"  r="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
      <circle cx="230" cy="-2" r="8"  fill="#1a1a1a"/>
    </g>

    <!-- Big bold G — hand-drawn-style sans-serif so it doesn't depend
         on a font being installed at rasterisation time. -->
    <path
      transform="translate(0, 80)"
      d="M 180,0
         C  90,0   25,75   25,170
         C  25,265  90,340 180,340
         C 245,340 290,310 320,265
         L 320,180
         L 200,180
         L 200,225
         L 270,225
         L 270,255
         C 250,275 220,290 180,290
         C 115,290  80,235  80,170
         C  80,105 115, 50 180, 50
         C 220, 50 252, 70 275,105
         L 320, 75
         C 290, 30 240,  0 180,  0 Z"
      fill="#1a1a1a"
    />
  </g>

  <!-- ═══════════════════════════════════════════════════════════════
       RIGHT — wordmark, tagline, phone CTA, trust line
       ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(620, 105)" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif">

    <!-- Star rating pill -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="320" height="44" rx="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
      <g transform="translate(20, 23)" fill="#F4C116" stroke="#1a1a1a" stroke-width="1">
        <polygon points="0,-8 2.4,-2.5 8,-2 4,2 5,8 0,5 -5,8 -4,2 -8,-2 -2.4,-2.5"/>
        <polygon points="20,-8 22.4,-2.5 28,-2 24,2 25,8 20,5 15,8 16,2 12,-2 17.6,-2.5"/>
        <polygon points="40,-8 42.4,-2.5 48,-2 44,2 45,8 40,5 35,8 36,2 32,-2 37.6,-2.5"/>
        <polygon points="60,-8 62.4,-2.5 68,-2 64,2 65,8 60,5 55,8 56,2 52,-2 57.6,-2.5"/>
        <polygon points="80,-8 82.4,-2.5 88,-2 84,2 85,8 80,5 75,8 76,2 72,-2 77.6,-2.5"/>
      </g>
      <text x="125" y="29" font-size="17" font-weight="800" fill="#1a1a1a" letter-spacing="0.05em">5.0 ON GOOGLE</text>
    </g>

    <!-- Wordmark -->
    <text x="0" y="135" font-size="92" font-weight="900" fill="#1a1a1a" letter-spacing="-0.02em">GIRAFFE</text>
    <text x="0" y="225" font-size="92" font-weight="900" fill="#F26C24" letter-spacing="-0.02em">CLEANING</text>

    <!-- Tagline -->
    <text x="0" y="285" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600" fill="#1a1a1a">
      Sparkling Windows Every Time — Orange County, CA
    </text>

    <!-- Phone CTA — black pill with yellow text -->
    <g transform="translate(0, 320)">
      <rect x="0" y="0" width="460" height="84" rx="18" fill="#1a1a1a"/>
      <rect x="0" y="0" width="460" height="84" rx="18" fill="none" stroke="#1a1a1a" stroke-width="3"/>
      <!-- phone glyph -->
      <g transform="translate(28, 26)" fill="none" stroke="#F4C116" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M27 22.92v3a2.4 2.4 0 0 1-2.62 2.4 23.7 23.7 0 0 1-10.36-3.69 23.4 23.4 0 0 1-7.2-7.2A23.7 23.7 0 0 1 3.13 7.07 2.4 2.4 0 0 1 5.53 4.45h3a2.4 2.4 0 0 1 2.4 2.06 15.4 15.4 0 0 0 0.84 3.37 2.4 2.4 0 0 1-0.54 2.53l-1.7 1.7a19.2 19.2 0 0 0 7.2 7.2l1.7-1.7a2.4 2.4 0 0 1 2.53-0.54 15.4 15.4 0 0 0 3.37 0.84A2.4 2.4 0 0 1 27 22.92z"/>
      </g>
      <text x="80" y="56" font-size="44" font-weight="900" fill="#F4C116">(949) 315-7142</text>
    </g>

    <!-- Trust line -->
    <text x="0" y="450" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#1a1a1a">
      Free Quotes  ·  Fully Insured  ·  35 OC Cities
    </text>
  </g>

  <!-- Sparkles for character (corners) -->
  <g fill="#1a1a1a" opacity="0.85">
    <path d="M 1080,80 l 8,-22 l 8,22 l 22,8 l -22,8 l -8,22 l -8,-22 l -22,-8 z"/>
    <path d="M 1110,540 l 6,-16 l 6,16 l 16,6 l -16,6 l -6,16 l -6,-16 l -16,-6 z"/>
    <path d="M 100,540 l 6,-16 l 6,16 l 16,6 l -16,6 l -6,16 l -6,-16 l -16,-6 z" opacity="0.5"/>
  </g>

  <!-- Domain in lower-right corner -->
  <text x="1162" y="600" text-anchor="end" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#1a1a1a" opacity="0.7">
    holygiraffe.com
  </text>
</svg>
